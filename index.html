<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Amarita Mexican Dictionary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            /* Amarita Theme */
            --accent-color: #ff55d2;
            --accent-secondary: #5ce1e6;
            --button-gradient: linear-gradient(135deg, #ff55d2, #a970ff);
        }
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,900&display=swap');
        
        /* CUSTOM TEXT SELECTION */
        ::selection {
            background-color: #ff55d2;
            color: #000000; 
        }

        /* 1. Base styles for the text */
        #version-control {
            font-size: 0.75em;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        /* 2. BASE STYLES AND SCROLLBAR */
        body {
            background-color: #000000;
            background-size: 200% 200%;
            animation: gradientShift 10s ease infinite;
            color: #efeff1; 
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: url('pointer.png') 8 8, auto;
        }

        footer {
            transition: all 0.3s ease;
        }

        a {
            cursor: url('pointer.png') 8 8, pointer;
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0410;
        }
        ::-webkit-scrollbar-thumb {
            background: #a970ff;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff55d2;
        }

        /* 3. HEADER AND TWITCH STATUS */
        .header-container {
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            width: 100%;
        }

        .logo-status-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-width: 80px;
        }

        .logo {
            height: 70px;
            width: 70px;
            border-radius: 50%; 
            object-fit: cover;
            border: 3px solid #ff55d2; 
            box-shadow: 0 0 10px rgba(255, 85, 210, 0.5); 
            transition: 0.3s;
        }

        .logo:hover {
            box-shadow: 0 0 20px rgba(255, 85, 210, 0.9);
            transform: scale(1.05);
        }

        h1 {
            color: #ff55d2;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-style: italic; 
        }

        #status-container { 
            display: flex;
            align-items: center; 
            font-size: 0.75em; 
            font-weight: 600; 
            color: #555; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* offline dot */
        .status-dot { 
            height: 10px;
            width: 10px; 
            border-radius: 50%; 
            margin-right: 8px; 
            background-color: #808080; 
            transition: all 0.3s ease;
        }

        .live-pulse { color: #ff4d4d !important; }
        .live-pulse .status-dot { 
            background-color: #ff4d4d;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulseRed 1.5s infinite; 
        }

        /* 4. MAIN TOGGLE BUTTON */
        .toggle-btn {
            background: rgba(23, 11, 41, 0.8);
            backdrop-filter: blur(5px);
            color: #ff55d2;
            border: 2px solid #ff55d2;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: url('pointer.png') 8 8, pointer !important;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: sticky;
            top: 20px; 
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:hover {
            background: linear-gradient(135deg, #ff55d2, #a970ff);
            color: #000000;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(169, 112, 255, 0.5);
            transform: translateY(-2px);
        }

        /* 5. FLASHCARD GRID AND TYPOGRAPHY */
        .container {
            width: 100%;
            max-width: 1000px;
        }

        #flashcard-view {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%; 
            max-width: 1000px;
            align-items: start;
        }

        .card {
            background-color: #22123f;
            border: 1px solid rgba(255, 85, 210, 0.15); 
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
            transform: translateZ(0);
            position: relative; /* Added to position the NSFW badge correctly */
            cursor: url('pointer.png') 8 8, pointer; 
        }

        .card:hover {
            border-color: #ff55d2;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 85, 210, 0.3);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 5px;
            color: #ff55d2;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .expand-icon {
            font-size: 0.6em;
            color: #8c8c9a;
            transition: transform 0.4s ease, color 0.3s ease;
        }

        .card.active .expand-icon {
            transform: rotate(180deg);
            color: #5ce1e6; 
            z-index: 100;
        }
        
        .literal {
            text-align: center;
            font-size: 0.9em;
            color: #8c8c9a;
            margin-bottom: 5px;
            font-style: italic;
        }

        .section-title {
            color: #8c8c9a;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            margin-top: 15px;
            font-weight: bold;
        }

        .card p {
            color: #b9b9c6;
            margin: 0 0 10px 0;
            font-size: 0.95em;
            font-weight: 400;
            line-height: 1.4;
        }

        .stream-context {
            background-color: #170b29;
            padding: 12px 15px;
            border-radius: 6px;
            border-left: 3px solid #ff55d2;
            font-size: 0.9em;
            margin-bottom: 15px;
            color: #b9b9c6;
        }

        .example-quote {
            color: #ffffff;
            font-weight: 500; 
            font-style: italic;
            display: block;
            margin-top: 12px;
            border-left: none; 
            background: rgba(255, 85, 210, 0.08); 
            padding: 10px 12px;
            border-radius: 6px;
        }

        audio {
            display: none;
        }

        /* 6. CLICK TO REVEAL ACCORDION LOGIC */
        .details {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1), opacity 0.3s ease;
        }

        .card.active .details {
            max-height: 600px;
            opacity: 1;
            transition: max-height 0.6s ease-in, opacity 0.5s ease 0.1s;
        }

        /* 7. PLAY BUTTON AND ANIMATIONS  */
        .cute-play-btn {
            background-color: transparent;
            color: #ff55d2;
            border: 2px solid #ff55d2;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px; 
            cursor: url('pointer.png') 8 8, pointer !important;
            margin: 10px auto;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
            max-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; 
        }

        .cute-play-btn:not(.playing):hover {
            background-color: #ff55d2;
            color: #0f071a; 
            border-color: #ff55d2;
            box-shadow: 0 0 15px rgba(255, 85, 210, 0.4);
            transform: translateY(-2px);
        }

        .cute-play-btn.playing {
            background-color: #ff55d2;
            color: #000000; 
            border-color: #ff55d2;
            font-weight: 900; 
            animation: neon-pulse 0.8s infinite alternate ease-in-out;
        }

        .wave-container {
            display: none;
            align-items: center;
            gap: 3px;
            height: 14px;
        }

        .wave-container .bar {
            width: 3px;
            height: 100%;
            background-color: #ff55d2;
            border-radius: 3px;
            animation: waveBounce 1s infinite ease-in-out;
        }
        
        .cute-play-btn.playing .bar { background-color: #000000; }
        .cute-play-btn.playing .btn-icon, .cute-play-btn.playing .text-play { display: none; }
        .cute-play-btn .text-playing { display: none; }
        
        .cute-play-btn.playing .text-playing { display: inline; }
        .cute-play-btn.playing .wave-container { display: inline-flex; }

        .wave-container .bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-container .bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-container .bar:nth-child(3) { animation-delay: 0.4s; }
        .wave-container .bar:nth-child(4) { animation-delay: 0.1s; }

        @keyframes waveBounce {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }

        @keyframes neon-pulse {
            0% {
                background-color: #ff55d2;
                box-shadow: 0 0 10px rgba(255, 85, 210, 0.4);
                color: #000000;
            }
            100% {
                background-color: #ff7ce0;
                box-shadow: 0 0 15px rgba(255, 85, 210, 0.9), 0 0 20px rgba(255, 85, 210, 0.4);
                color: #000000;
            }
        }

        @keyframes pulseRed {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        /* 8. FOCUS MODE (DIMMING AND BLUR) */
        .card, .list-item {
            background-color: #1a0d2e;
            cursor: url('pointer.png') 8 8, pointer;
        }

        body.is-playing .card:not(.active-play),
        body.is-playing .list-item:not(.active-play) {
            opacity: 0.25;
            filter: blur(5px) grayscale(40%);
            transition: all 0.3s ease;
            pointer-events: none !important;
        }

        body.is-playing .card.active-play,
        body.is-playing .list-item.active-play {
            pointer-events: auto !important;
        }

        body.is-playing .header-container,
        body.is-playing .toggle-btn,
        body.is-playing .search-container,
        body.is-playing #version-control,
        body.is-playing footer,
        body.is-playing #suggestion-form { 
            opacity: 0.2;
            filter: blur(5px) grayscale(50%);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        @media (hover: hover) and (pointer: fine) {
            #suggestion-form button:hover {
                background-color: #5ce1e6 !important;
                color: #000000 !important;
                box-shadow: 0 0 15px rgba(92, 225, 230, 0.6);
                transform: translateY(-2px);
            }
        }
        
        #suggestion-form button:active {
            transform: translateY(1px);
            box-shadow: 0 0 5px rgba(92, 225, 230, 0.4);
        }

        body.is-playing .card.active-play,
        body.is-playing .list-item.active-play {
            opacity: 1;
            filter: blur(0px) grayscale(0%);
            transform: scale(1.03);
            border-color: #5ce1e6; 
            box-shadow: 
                0 0 8px rgba(92, 225, 230, 0.8),   
                0 0 20px rgba(92, 225, 230, 0.4),  
                0 15px 30px rgba(92, 225, 230, 0.15);
            z-index: 100;
        }

        /* 9. CHEAT SHEET VIEW */
        #cheatsheet-view {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-item {
            background-color: #22123f;
            transition: 0.3s ease;
            padding: 15px 20px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 200px 1fr;
            align-items: center;
            border: 1px solid rgba(255, 85, 210, 0.15); 
            border-left: 4px solid #ff55d2; 
            gap: 20px;
        }

        .list-item:hover {
            background-color: #2a164d;
            border-left-color: #5ce1e6;
            transform: translateX(8px);
        }

        .list-item.active {
            z-index: 100;
            position: relative; 
            border-left-color: #5ce1e6; 
        }

        .list-item.active h3 {
            color: #5ce1e6;
            transition: color 0.3s ease;
        }

        .list-content p {
            color: #b9b9c6;
            margin: 0 0 10px 0;
            font-size: 0.95em;
            font-weight: 400;
            line-height: 1.4;
        }
        
        .list-content .example-quote {
            color: #efeff1;
            font-weight: 400;
            font-style: italic;
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px; 
            border-left: 3px solid #5ce1e6; 
            background: rgba(92, 225, 230, 0.08);
            border-radius: 0 6px 6px 0; 
        }

        .label {
            color: #a970ff;
            font-weight: bold;
            margin-right: 5px;
        }

        /* 10. MOBILE RESPONSIVENESS  */
        @media (max-width: 600px) {
            .list-item {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .header-container {
                flex-direction: column;
                text-align: center;
            }
        }

        /* 11. STOOPID AHH MOBILE BUG FIXES */
        * {
            -webkit-tap-highlight-color: transparent !important;
        }

        footer .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 24px;
            margin-top: 20px;
        }

        footer .social-links a {
            color: #5ce1e6 !important;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            display: inline-block !important;
            text-decoration: none;
        }

        @media (hover: hover) and (pointer: fine) {
            footer .social-links a:hover {
                transform: scale(1.5) !important;
                color: #ff55d2 !important; 
            }
            .mango-btn:hover {
                transform: scale(1.2);
                filter: drop-shadow(0 0 8px rgba(255, 179, 71, 0.8)); 
            }
        }

        .btn-success {
            pointer-events: none !important;
            background-color: #2ecc71 !important;
            box-shadow: none !important;
        }

        .mango-btn:active {
            transform: scale(1) !important;
            filter: drop-shadow(0 0 0px rgba(255, 179, 71, 0)) !important;
        }

        .animate-mango {
            transform: scale(1.2) !important;
            filter: drop-shadow(0 0 8px rgba(255, 179, 71, 0.8)) !important;
            transition: all 0.3s ease;
        }

        /* 12. CUTE SEARCH BAR & EXPLICIT BADGES */
        .search-container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff55d2;
            font-size: 1.1em;
            pointer-events: none;
        }

        .search-input-wrapper input {
            width: 100%;
            background: rgba(26, 13, 46, 0.8);
            border: 2px solid #ff55d2;
            color: #efeff1;
            padding: 14px 20px 14px 45px;
            border-radius: 30px; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            outline: none;
            box-shadow: 0 5px 15px rgba(255, 85, 210, 0.15);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input-wrapper input:focus {
            border-color: #5ce1e6;
            box-shadow: 0 5px 20px rgba(92, 225, 230, 0.4);
            background: rgba(26, 13, 46, 1);
        }

        .select-wrapper {
            position: relative;
            min-width: 180px;
        }

        .select-wrapper select {
            width: 100%;
            appearance: none; 
            background: rgba(26, 13, 46, 0.8);
            border: 2px solid #ff55d2;
            color: #efeff1;
            padding: 14px 40px 14px 20px;
            border-radius: 30px; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            font-weight: 600;
            outline: none;
            box-shadow: 0 5px 15px rgba(255, 85, 210, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .select-wrapper select:focus {
            border-color: #5ce1e6;
            box-shadow: 0 5px 20px rgba(92, 225, 230, 0.4);
            background: rgba(26, 13, 46, 1);
        }

        .select-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff55d2;
            pointer-events: none;
        }

        .explicit-badge {
            background-color: #ff4d4d;
            color: #000;
            font-size: 0.55em;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }

        /* Pin the badge to the corner of the card so it doesn't mess up centering */
        .card .explicit-badge {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        /* Keep it inline for the list view since it's already left-aligned */
        .list-item .explicit-badge {
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-status-wrapper">
            <a href="https://www.twitch.tv/okieamara" target="_blank">
                <img src="272ee8b7-9518-4037-916c-ef6d75fb28fc-profile_image-70x70.png" alt="Amarita Logo" class="logo">
            </a>
            <div id="status-container">
                <span id="twitch-status" class="status-dot"></span>
                <span id="status-text">Offline</span>
            </div>
        </div>
        <h1>AMARITA 
            <span style="color: #2ecc71;">M</span><span style="color: #2ecc71;">E</span><span style="color: #ffffff;">X</span><span style="color: #ffffff;">I</span><span style="color: #ffffff;">C</span><span style="color: #ff4d4d;">A</span><span style="color: #ff4d4d;">N</span> 
            DICTIONARY
        </h1>
    </div>
    
    <button class="toggle-btn" id="toggleBtn" onclick="toggleView()">
        <i class="fas fa-list" style="margin-right: 8px;"></i> Switch to Cheat Sheet Mode
    </button>

    <!-- UPDATED CUTE SEARCH BAR -->
    <div class="search-container">
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search for a word, meaning, or vibe..."
            >

        <div class="select-wrapper">
            <select id="categoryFilter">
                <option value="All">🌸 All Categories</option>
                <option value="Tactical">⚔️ Tactical</option>

                <option value="Vibe">✨ Vibe</option>
            </select>
            <i class="fas fa-chevron-down select-icon"></i>
        </div>
    </div>

    <div id="version-control">
        Last Updated: <span id="update-date">Loading...</span>

    <div id="flashcard-view"></div>
    <div id="cheatsheet-view" class="hidden"></div>

    <form id="suggestion-form" action="https://api.sheetmonkey.io/form/51DRKWQW38cSYMV9x6EWE8" method="post" style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 450px; margin: 40px auto 20px auto; padding: 0 20px; box-sizing: border-box;">
        <p style="color: #8c8c9a; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; text-align: center; margin-top: 0;">
            Missing a word?
        </p>
        <div style="display: flex; width: 100%; gap: 10px; justify-content: center;">
            <input type="text" name="Suggestion" placeholder="Type a word or phrase..." required 
                style="flex: 1; background: #1a0d2e; border: 1px solid #ff55d2; color: #efeff1; padding: 12px 20px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.95em; outline: none; box-shadow: 0 0 10px rgba(255, 85, 210, 0.1); box-sizing: border-box; text-align: center;">
            <button type="submit" 
                style="background: #ff55d2; color: #000000; border: none; padding: 12px 25px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase;">
                Send
            </button>
        </div>
    </form>
    
    <footer style="margin-top: 50px; padding: 20px; text-align: center; border-top: 1px solid #361d63; width: 100%; max-width: 1000px;">
        <p class="mango-btn" style="color: #ffb347; font-size: 0.9em; margin-bottom: 15px; font-weight: bold; cursor: pointer;" onclick="playRandomMango()">
            🥭 Official Amarita Hub
        </p>
        <audio id="mango-audio" preload="none"></audio>
        
        <div class="social-links">
            <a href="https://www.twitch.tv/okieamara" target="_blank"><i class="fab fa-twitch"></i></a>
            <a href="https://x.com/okieamara" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/okieamara" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@okieamara" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.tiktok.com/@ohokieamara" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://discord.gg/amara" target="_blank"><i class="fab fa-discord"></i></a>
        </div>
    </footer>

    <!-- 1. Load data -->
    <script src="data.js"></script>

    <!-- 2. Run engine -->
    <script>
        // ENGINE FOR DYNAMIC CARD RENDERING
        function generateDictionaryDOM(data = dictionaryData) {
            const flashcardContainer = document.getElementById('flashcard-view');
            const cheatsheetContainer = document.getElementById('cheatsheet-view');
            
            let flashcardsHTML = '';
            let cheatsheetHTML = '';

            // Handle empty search results
            if (data.length === 0) {
                flashcardContainer.innerHTML = '<p style="text-align:center; width:100%; color:#8c8c9a;">No terms found. Ni modo.</p>';
                cheatsheetContainer.innerHTML = '<p style="text-align:center; width:100%; color:#8c8c9a;">No terms found. Ni modo.</p>';
                return;
            }

            data.forEach(item => {
                // Check if it's explicit and add the badge
                const explicitBadge = item.explicit ? '<span class="explicit-badge">NSFW</span>' : '';

                // Build dynamic flashcard view strings (Notice the badge is outside the h2 now!)
                flashcardsHTML += `
                    <div class="card">
                        ${explicitBadge}
                        <h2>${item.term} <i class="fas fa-chevron-down expand-icon"></i></h2>
                        <div class="literal">Literal: ${item.literal}</div>
                        <div class="details">
                            <div class="section-title">Meaning</div>
                            <p>${item.meaning}</p>
                            <div class="section-title">Stream Context</div>
                            <div class="stream-context">
                                ${item.context}
                                <span class="example-quote">"${item.quote}"</span>
                            </div>
                            <button class="cute-play-btn" onclick="playClip(this)">
                                <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                <span class="wave-container">
                                    <span class="bar"></span>
                                    <span class="bar"></span>
                                    <span class="bar"></span>
                                    <span class="bar"></span>
                                </span>
                                <span class="text-play">PLAY AUDIO</span>
                                <span class="text-playing">PLAYING...</span>
                            </button>
                            <audio preload="none"><source src="${item.audio}" type="audio/mp4"></audio>
                        </div>
                    </div>
                `;

                // Build dynamic cheat sheet view strings
                cheatsheetHTML += `
                    <div class="list-item">
                        <h3>${item.term} ${explicitBadge}</h3>
                        <div class="list-content">
                            <p><span class="label">Meaning:</span> ${item.meaning}</p>
                            <span class="example-quote"><span class="label">Example:</span> "${item.quote}"</span>
                        </div>
                    </div>
                `;
            });

            flashcardContainer.innerHTML = flashcardsHTML;
            cheatsheetContainer.innerHTML = cheatsheetHTML;

            // Re-bind click event listeners to the new dynamic items
            bindGlobalClickListeners();
        }

        // --- FILTER LOGIC ---
        function filterDictionary() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value;

            const filteredData = dictionaryData.filter(item => {
                // Check if text matches term or meaning
                const matchesText = item.term.toLowerCase().includes(searchText) || 
                                    item.meaning.toLowerCase().includes(searchText);
                
                // Check category
                const matchesCategory = selectedCategory === 'All' || item.category === selectedCategory;

                return matchesText && matchesCategory;
            });

            // Re-render the UI with only the matching items
            generateDictionaryDOM(filteredData);
        }

        // 1. AUDIO AND FOCUS RESET FUNCTION
        function resetAllAudio() {
            document.querySelectorAll('audio').forEach(a => {
                a.pause();
                a.currentTime = 0;
            });
            document.querySelectorAll('.cute-play-btn').forEach(b => b.classList.remove('playing'));
            
            document.querySelectorAll('.card, .list-item').forEach(c => {
                c.classList.remove('active-play');
                c.classList.remove('active'); 
            });
            document.body.classList.remove('is-playing');
        }

        // 2. TOGGLE CHEAT SHEET / FLASHCARD VIEW
        function toggleView() {
            resetAllAudio();
            const flashcards = document.getElementById('flashcard-view');
            const cheatsheet = document.getElementById('cheatsheet-view');
            const button = document.getElementById('toggleBtn');
            
            if (!flashcards || !cheatsheet) return;

            flashcards.classList.toggle('hidden');
            cheatsheet.classList.toggle('hidden');
            if (flashcards.classList.contains('hidden')) {
                button.innerHTML = '<i class="fas fa-th-large" style="margin-right: 8px;"></i> Switch to Flashcard Mode';
                localStorage.setItem('amaritaViewPref', 'cheatsheet'); 
            } else {
                button.innerHTML = '<i class="fas fa-list" style="margin-right: 8px;"></i> Switch to Cheat Sheet Mode';
                localStorage.setItem('amaritaViewPref', 'flashcard'); 
            }
        }

        // 3. PLAY AUDIO CLIP LOGIC
        function playClip(btn) {
            const card = btn.closest('.card');
            const audio = card.querySelector('audio');

            if (!audio) return;

            if (!audio.paused) {
                resetAllAudio();
                card.classList.add('active');
                card.classList.add('active-play');
                document.body.classList.add('is-playing');
                return;
            }

            resetAllAudio();
            card.classList.add('active');
            card.classList.add('active-play');
            document.body.classList.add('is-playing');
            audio.play().then(() => {
                btn.classList.add('playing');
            }).catch(e => console.log("Playback blocked or file missing:", e));
            audio.onended = () => {
                resetAllAudio();
                card.classList.add('active'); 
                card.classList.add('active-play');
                document.body.classList.add('is-playing');
            };
        }

        // 4. CLICK OUTSIDE TO RESET FOCUS
        document.addEventListener('click', function(event) {
            const clickedInsideElement = event.target.closest('.card, .list-item');
            const clickedToggleButton = event.target.closest('.toggle-btn');
            
            if (!clickedInsideElement && !clickedToggleButton && document.body.classList.contains('is-playing')) {
                resetAllAudio();
            }
        });

        // 5. TWITCH STREAMER LIVE STATUS TRACKER
        async function checkTwitchLive() {
            const username = 'okieamara';
            const container = document.getElementById('status-container');
            const text = document.getElementById('status-text');
            
            try {
                const response = await fetch(`https://decapi.me/twitch/uptime/${username}`);
                const data = await response.text();

                if (data.includes("offline")) {
                    container.classList.remove("live-pulse");
                    text.innerText = "Offline";
                    text.style.color = "#808080";
                } else {
                    container.classList.add("live-pulse");
                    text.innerText = "Live";
                }
            } catch (e) { 
                text.innerText = "Error";
            }
        }

        // 6. CLICK TO FOCUS LOGIC SETUP DEFINITION
        function bindGlobalClickListeners() {
            document.querySelectorAll('.card, .list-item').forEach(element => {
                element.addEventListener('click', function(event) {
                    if (event.target.closest('.cute-play-btn')) return;
                    
                    const isAlreadyActive = this.classList.contains('active-play');
                    resetAllAudio();
       
                    if (!isAlreadyActive) {
                        if (this.classList.contains('card')) {
                            this.classList.add('active'); 
                        }
                        this.classList.add('active-play'); 
                        document.body.classList.add('is-playing');
                    }
                });
            });
        }

        // INITIAL DEPLOYMENT EXECUTION
        window.addEventListener('DOMContentLoaded', () => {
            // Render all items dynamically out of data structure
            generateDictionaryDOM();

            // Attach Search Bar Listeners
            document.getElementById('searchInput').addEventListener('input', filterDictionary);
            document.getElementById('categoryFilter').addEventListener('change', filterDictionary);

            // Handle layout configuration state preferences
            const savedView = localStorage.getItem('amaritaViewPref');
            if (savedView === 'cheatsheet') {
                const flashcards = document.getElementById('flashcard-view');
                const cheatsheet = document.getElementById('cheatsheet-view');
                const button = document.getElementById('toggleBtn');
                
                flashcards.classList.add('hidden');
                cheatsheet.classList.remove('hidden');
                button.innerHTML = '<i class="fas fa-th-large" style="margin-right: 8px;"></i> Switch to Flashcard Mode';
            }

            // Run status trackers
            checkTwitchLive();
            setInterval(checkTwitchLive, 60000);

            // Handle timestamp metadata metrics calculation logic
            const updateSpan = document.getElementById('update-date');
            if (updateSpan) {
                const now = new Date();
                const lastModified = new Date(document.lastModified);
                const diffMs = now - lastModified;
                const diffMinutes = Math.floor(diffMs / (1000 * 60));
                const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                
                let timeText = "";
                if (diffMinutes < 5) {
                    timeText = "Just now";
                } else if (diffMinutes < 60) {
                    timeText = `${diffMinutes} minutes ago`;
                } else if (diffHours < 24) {
                    timeText = diffHours === 1 ? "1 hour ago" : `${diffHours} hours ago`;
                } else {
                    const diffDays = Math.floor(diffHours / 24);
                    timeText = diffDays === 1 ? "1 day ago" : `${diffDays} days ago`;
                }
                updateSpan.innerText = timeText;
            }
        });

        // ESC KEY TO CLOSE CARDS
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && document.body.classList.contains('is-playing')) {
                resetAllAudio(); 
            }
        });

        // MANGO MEDIA HANDLING LOGIC
        let playedClips = [];
        function playRandomMango() {
            const audio = document.getElementById('mango-audio');
            const mangoBtn = document.querySelector('.mango-btn'); 
            const clips = [
                'audio/I DID IT.m4a',
                'audio/LIFE CHANGING QUOTE.m4a',
                'audio/VAZZINGTON.m4a',
                'audio/YEYEYE.m4a',
                'audio/WHAT THE FLUFFER AMARA.m4a'
            ];

            if (playedClips.length === clips.length) {
                playedClips = [];
            }

            let availableClips = clips.filter(clip => !playedClips.includes(clip));
            const randomClip = availableClips[Math.floor(Math.random() * availableClips.length)];
            
            mangoBtn.classList.add('animate-mango');
            audio.src = randomClip;
            audio.play().catch(e => console.log("Mango playback failed:", e));
            playedClips.push(randomClip);
            
            audio.onended = () => {
                mangoBtn.classList.remove('animate-mango');
            };
        }

        // BACKGROUND FORM SUBMISSION
        const suggestionForm = document.getElementById('suggestion-form');
        if (suggestionForm) {
            suggestionForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const button = e.target.querySelector('button');
                const originalText = button.innerText;

                button.innerText = 'SENDING...';
                button.style.background = '#5ce1e6'; 

                fetch(e.target.action, {
                    method: 'POST',
                    body: new FormData(e.target),
                })
                .then(response => {
                    if(response.ok) {
                        button.innerText = 'SENT!';
                        button.classList.add('btn-success'); 
                        e.target.reset(); 
                    }
                })
                .catch(() => {
                    button.innerText = 'ERROR';
                    button.style.background = '#ff4d4d';
                })
                .finally(() => {
                    setTimeout(() => {
                        button.innerText = originalText;
                        button.classList.remove('btn-success'); 
                        button.style.background = '#ff55d2'; 
                        button.style.boxShadow = '';  
                    }, 3000);
                });
            });
        }
    </script>
</body>
</html>
