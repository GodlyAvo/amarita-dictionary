<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Amarita Mexican Dictionary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            /* Amarita Theme */
            --accent-color: #ff55d2;
            --accent-secondary: #5ce1e6;
            --button-gradient: linear-gradient(135deg, #ff55d2, #a970ff);
        }
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,900&display=swap');
        
        /* CUSTOM TEXT SELECTION */
        ::selection {
            background-color: #ff55d2;
            color: #000000; 
        }

        #version-control {
            font-size: 0.75em;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        /* BASE STYLES AND SCROLLBAR */
        body {
            background-color: #000000;
            background-size: 200% 200%;
            animation: gradientShift 10s ease infinite;
            color: #efeff1; 
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: url('pointer.png') 8 8, auto;
        }

        footer {
            transition: all 0.3s ease;
        }

        a {
            cursor: url('pointer.png') 8 8, pointer;
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0410;
        }
        ::-webkit-scrollbar-thumb {
            background: #a970ff;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff55d2;
        }

        /* HEADER AND TWITCH STATUS */
        .header-container {
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            width: 100%;
        }

        .logo-status-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-width: 80px;
        }

        .logo {
            height: 70px;
            width: 70px;
            border-radius: 50%; 
            object-fit: cover;
            border: 3px solid #ff55d2; 
            box-shadow: 0 0 10px rgba(255, 85, 210, 0.5); 
            transition: 0.3s;
        }

        .logo:hover {
            box-shadow: 0 0 20px rgba(255, 85, 210, 0.9);
            transform: scale(1.05);
        }

        h1 {
            color: #ff55d2;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-style: italic; 
            cursor: pointer;
        }

        #status-container { 
            display: flex;
            align-items: center; 
            font-size: 0.75em; 
            font-weight: 600; 
            color: #555; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .status-dot { 
            height: 10px;
            width: 10px; 
            border-radius: 50%; 
            margin-right: 8px; 
            background-color: #808080; 
            transition: all 0.3s ease;
        }

        .live-pulse { color: #ff4d4d !important; }
        .live-pulse .status-dot { 
            background-color: #ff4d4d;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulseRed 1.5s infinite; 
        }

        /* INSTA TAP REGISTRATION */
        button, .card, .list-item, .toggle-btn, h1, .mango-btn, .action-btn {
            touch-action: manipulation;
        }

        /* MAIN TOGGLE BUTTON */
        .toggle-btn {
            background: rgba(23, 11, 41, 0.8);
            backdrop-filter: blur(5px);
            color: #ff55d2;
            border: 2px solid #ff55d2;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: url('pointer.png') 8 8, pointer !important;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: sticky;
            top: 15px; 
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:hover {
            background: linear-gradient(135deg, #ff55d2, #a970ff);
            color: #000000;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(169, 112, 255, 0.5);
            transform: translateY(-2px);
        }

        /* FLASHCARD GRID AND TYPOGRAPHY */
        .container {
            width: 100%;
            max-width: 1000px;
        }

        #flashcard-view {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; 
            width: 100%; 
            max-width: 1000px;
            align-items: start;
        }

        .card {
            background-color: #22123f;
            border: 1px solid rgba(255, 85, 210, 0.15); 
            backdrop-filter: blur(10px); 
            border-radius: 12px;
            padding: 25px; 
            text-align: left;
            
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
            transform: translateZ(0);
            
            will-change: transform, box-shadow;
            
            position: relative;
            cursor: url('pointer.png') 8 8, pointer; 
        }

        /* Mobile browsers dont render hidden cards */
        #flashcard-view .card {
            content-visibility: auto;
            contain-intrinsic-size: 200px; 
        }

        .card:hover {
            border-color: #ff55d2;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 85, 210, 0.3);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 5px;
            color: #ff55d2;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .expand-icon {
            font-size: 0.6em;
            color: #8c8c9a;
            transition: transform 0.4s ease, color 0.3s ease;
        }

        .card.active .expand-icon {
            transform: rotate(180deg);
            color: #5ce1e6; 
            z-index: 100;
        }
        
        .literal {
            text-align: center;
            font-size: 0.9em;
            color: #b9b9c6; 
            margin-bottom: 5px;
            font-style: italic;
        }

        .section-title {
            color: #efeff1;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            margin-top: 15px;
            font-weight: bold;
        }

        .card p {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 0.95em;
            font-weight: 400;
            line-height: 1.4;
        }

        .stream-context {
            background-color: #170b29;
            padding: 12px 15px;
            border-radius: 6px;
            border-left: 3px solid #ff55d2;
            font-size: 0.9em;
            margin-bottom: 15px;
            color: #b9b9c6;
        }

        .example-quote {
            color: #ffffff;
            font-weight: 500; 
            font-style: italic;
            display: block;
            margin-top: 12px;
            border-left: none; 
            background: rgba(255, 85, 210, 0.08); 
            padding: 10px 12px;
            border-radius: 6px;
        }

        audio {
            display: none;
        }

        audio.recorded-audio-player {
            display: block;
            margin-bottom: 10px;
            border-radius: 30px;
        }

        /* CLICK TO REVEAL ACCORDION LOGIC */
        .details {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1), opacity 0.3s ease;
            will-change: max-height, opacity; 
        }

        .card.active .details {
            max-height: 950px;
            opacity: 1;
            transition: max-height 0.6s ease-in, opacity 0.5s ease 0.1s;
        }

        /* PLAY BUTTON AND ANIMATIONS  */
        .cute-play-btn {
            background-color: transparent;
            color: #ff55d2;
            border: 2px solid #ff55d2;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px; 
            cursor: url('pointer.png') 8 8, pointer !important;
            margin: 10px auto;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
            max-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; 
        }

        /* CUSTOM AMARITA AUDIO BUTTON */
        .cute-play-btn.amarita-audio {
            border-color: #ffb347;
            color: #ffb347;
        }
        .cute-play-btn.amarita-audio:not(.playing):hover {
                background-color: #ffb347;
                color: #000;
                box-shadow: 0 0 15px rgba(255, 179, 71, 0.4);
            }
        .cute-play-btn:not(.playing):hover {
                background-color: #ff55d2;
                color: #0f071a; 
                border-color: #ff55d2;
                box-shadow: 0 0 15px rgba(255, 85, 210, 0.4);
                transform: translateY(-2px);
            }
        .cute-play-btn.amarita-audio .bar {
            background-color: #ffb347;
        }
        .cute-play-btn.amarita-audio.playing .bar {
            background-color: #000;
        }

        @keyframes mango-pulse {
            0% { box-shadow: 0 0 10px rgba(255, 179, 71, 0.4); }
            100% { box-shadow: 0 0 15px rgba(255, 179, 71, 0.9), 0 0 20px rgba(255, 179, 71, 0.4); }
        }

        .cute-play-btn:not(.playing):hover {
            background-color: #ff55d2;
            color: #0f071a; 
            border-color: #ff55d2;
            box-shadow: 0 0 15px rgba(255, 85, 210, 0.4);
            transform: translateY(-2px);
        }

        .cute-play-btn.playing {
            background-color: #ff55d2;
            color: #000000; 
            border-color: #ff55d2;
            font-weight: 900; 
            animation: neon-pulse 0.8s infinite alternate ease-in-out;
        }

        .wave-container {
            display: none;
            align-items: center;
            gap: 3px;
            height: 14px;
        }

        .wave-container .bar {
            width: 3px;
            height: 100%;
            background-color: #ff55d2;
            border-radius: 3px;
            animation: waveBounce 1s infinite ease-in-out;
        }
        
        .cute-play-btn.playing .bar { background-color: #000000; }
        .cute-play-btn.playing .btn-icon, .cute-play-btn.playing .text-play { display: none; }
        .cute-play-btn .text-playing { display: none; }
        
        .cute-play-btn.playing .text-playing { display: inline; }
        .cute-play-btn.playing .wave-container { display: inline-flex; }

        .wave-container .bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-container .bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-container .bar:nth-child(3) { animation-delay: 0.4s; }
        .wave-container .bar:nth-child(4) { animation-delay: 0.1s; }

        @keyframes waveBounce {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }

        @keyframes neon-pulse {
            0% {
                background-color: #ff55d2;
                box-shadow: 0 0 10px rgba(255, 85, 210, 0.4);
                color: #000000;
            }
            100% {
                background-color: #ff7ce0;
                box-shadow: 0 0 15px rgba(255, 85, 210, 0.9), 0 0 20px rgba(255, 85, 210, 0.4);
                color: #000000;
            }
        }

        @keyframes pulseRed {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        @keyframes pulseStop {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.4); }
            50% { box-shadow: 0 0 15px rgba(255, 77, 77, 0.9), inset 0 0 10px rgba(255, 77, 77, 0.3); }
        }

        /* FOCUS MODE (DIMMING AND BLUR) */
        .card, .list-item {
            background-color: #1a0d2e;
            cursor: url('pointer.png') 8 8, pointer;
        }

        body.is-playing .card:not(.active-play),
        body.is-playing .list-item:not(.active-play) {
            opacity: 0.25;
            filter: blur(5px) grayscale(40%);
            transition: all 0.3s ease;
            pointer-events: none !important;
        }

        body.is-playing .card.active-play,
        body.is-playing .list-item.active-play {
            pointer-events: auto !important;
        }

        body.is-playing .header-container,
        body.is-playing .toggle-btn,
        body.is-playing .search-container,
        body.is-playing #version-control,
        body.is-playing footer,
        body.is-playing #suggestion-form { 
            opacity: 0.2;
            filter: blur(5px) grayscale(50%);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        @media (hover: hover) and (pointer: fine) {
            .card:hover {
                border-color: #ff55d2;
                transform: translateY(-5px);
                box-shadow: 0 10px 30px rgba(255, 85, 210, 0.3);
            }
        
        #suggestion-form button:active {
            transform: translateY(1px);
            box-shadow: 0 0 5px rgba(92, 225, 230, 0.4);
        }

        body.is-playing .card.active-play,
        body.is-playing .list-item.active-play {
            opacity: 1;
            filter: blur(0px) grayscale(0%);
            transform: scale(1.03);
            border-color: #5ce1e6; 
            box-shadow: 
                0 0 8px rgba(92, 225, 230, 0.8),   
                0 0 20px rgba(92, 225, 230, 0.4),  
                0 15px 30px rgba(92, 225, 230, 0.15);
            z-index: 100;
        }

        /* CHEAT SHEET VIEW */
        #cheatsheet-view {
            display: flex;
            flex-direction: column;
            gap: 12px; 
            width: 100%;
            max-width: 1000px;
        }

        .list-item {
            background-color: #22123f;
            transition: 0.3s ease;
            padding: 18px 25px; 
            border-radius: 8px;
            display: grid;
            grid-template-columns: 220px 1fr;
            align-items: center;
            border: 1px solid rgba(255, 85, 210, 0.15); 
            border-left: 4px solid #ff55d2; 
            gap: 20px;
        }

        .list-item:hover {
                background-color: #2a164d;
                border-left-color: #5ce1e6;
                transform: translateX(8px);
            }

        .list-item.active {
            z-index: 100;
            position: relative; 
            border-left-color: #5ce1e6; 
        }

        .list-item.active h3 {
            color: #5ce1e6;
            transition: color 0.3s ease;
        }

        .list-content p {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 0.95em;
            font-weight: 400;
            line-height: 1.4;
        }
        
        .list-content .example-quote {
            color: #efeff1;
            font-weight: 400;
            font-style: italic;
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px; 
            border-left: 3px solid #5ce1e6; 
            background: rgba(92, 225, 230, 0.08);
            border-radius: 0 6px 6px 0; 
        }

        .label {
            color: #a970ff;
            font-weight: bold;
            margin-right: 5px;
        }

        /* 10. MOBILE RESPONSIVENESS */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }
            /* Removes the expensive glass blur on mobile cards */
            .card {
                backdrop-filter: none;
                background-color: rgba(34, 18, 63, 0.98); 
            }
            
            /* Remove heavy background blur when a card is being played/open */
            body.is-playing .card:not(.active-play),
            body.is-playing .list-item:not(.active-play),
            body.is-playing .header-container,
            body.is-playing .toggle-btn,
            body.is-playing .search-container,
            body.is-playing footer {
                filter: none; 
                opacity: 0.25; 
            }

            .header-container {
                flex-direction: column;
                text-align: center;
                gap: 15px;
                margin-bottom: 20px;
            }
            .logo {
                height: 55px;
                width: 55px; 
            }
            h1 {
                font-size: 1.4em;
            }
            .list-item {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 15px;
            }
            .search-container {
                margin-bottom: 20px;
            }
            .search-input-wrapper {
                min-width: 100%;
            }
        }

        * {
            -webkit-tap-highlight-color: transparent !important;
        }

        footer .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 24px;
            margin-top: 20px;
        }

        footer .social-links a {
            color: #5ce1e6 !important;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            display: inline-block !important;
            text-decoration: none;
        }

        @media (hover: hover) and (pointer: fine) {
            footer .social-links a:hover {
                transform: scale(1.5) !important;
                color: #ff55d2 !important; 
            }
            .mango-btn:hover {
                transform: scale(1.2);
                filter: drop-shadow(0 0 8px rgba(255, 179, 71, 0.8)); 
            }
        }

        .btn-success {
            pointer-events: none !important;
            background-color: #2ecc71 !important;
            box-shadow: none !important;
        }

        .mango-btn:active {
            transform: scale(1) !important;
            filter: drop-shadow(0 0 0px rgba(255, 179, 71, 0)) !important;
        }

        .animate-mango {
            transform: scale(1.2) !important;
            filter: drop-shadow(0 0 8px rgba(255, 179, 71, 0.8)) !important;
            transition: all 0.3s ease;
        }

        /* SEARCH BAR AND EXPLICIT BADGES */
        .search-container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff55d2;
            font-size: 1.1em;
            pointer-events: none;
        }

        .search-input-wrapper input {
            width: 100%;
            background: rgba(26, 13, 46, 0.8);
            border: 2px solid #ff55d2;
            color: #efeff1;
            padding: 14px 45px 14px 45px; 
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            outline: none;
            box-shadow: 0 5px 15px rgba(255, 85, 210, 0.15);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input-wrapper input:focus {
            border-color: #5ce1e6;
            box-shadow: 0 5px 20px rgba(92, 225, 230, 0.4);
            background: rgba(26, 13, 46, 1);
        }

        .clear-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #8c8c9a;
            font-size: 1.1em;
            cursor: pointer;
            cursor: url('pointer.png') 8 8, pointer;
            transition: all 0.2s ease;
            display: none; 
        }

        .clear-icon:hover {
            color: #ff4d4d;
            transform: translateY(-50%) scale(1.1);
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }

        .select-wrapper {
            position: relative;
            min-width: 180px;
        }

        .select-wrapper select {
            width: 100%;
            appearance: none; 
            background: rgba(26, 13, 46, 0.8);
            border: 2px solid #ff55d2;
            color: #efeff1;
            padding: 14px 40px 14px 20px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            font-weight: 600;
            outline: none;
            box-shadow: 0 5px 15px rgba(255, 85, 210, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .select-wrapper select:focus {
            border-color: #5ce1e6;
            box-shadow: 0 5px 20px rgba(92, 225, 230, 0.4);
            background: rgba(26, 13, 46, 1);
        }

        .select-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff55d2;
            pointer-events: none;
        }

        .explicit-badge {
            background-color: #ff4d4d;
            color: #000;
            font-size: 0.55em;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }

        .card .explicit-badge {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .list-item .explicit-badge {
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        
        .empty-state {
            text-align: center;
            width: 100%;
            color: #8c8c9a;
            font-size: 1.1em;
            padding: 40px 0;
            grid-column: 1 / -1;
        }
        
        .empty-state a {
            color: #000;
            background-color: #ff55d2;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .empty-state a:hover {
            background-color: #5ce1e6;
            box-shadow: 0 0 15px rgba(92, 225, 230, 0.5);
            transform: translateY(-2px);
        }

        .recording-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255, 85, 210, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .record-btn, .stop-btn, .action-btn {
            background-color: #1a0d2e;
            color: #efeff1;
            border: 1px solid #5ce1e6;
            padding: 8px 15px;
            font-size: 0.85em;
            font-family: 'Poppins', sans-serif;

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCacS6ICWfmwGoJCJkaBcUinvsd0lYMYx0",
            authDomain: "amarita-dictionary.firebaseapp.com",
            projectId: "amarita-dictionary",
            storageBucket: "amarita-dictionary.firebasestorage.app",
            messagingSenderId: "516306775046",
            appId: "1:516306775046:web:52c62d0b61dbafe71fe787"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const storage = firebase.storage();
        const db = firebase.firestore();

        let globalDictionaryData = []; 
        let isAdmin = false;
        let isInitialLoad = true;
        let titleClickTimeout = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log("Welcome back, Admin!");
                isAdmin = true;
                document.querySelectorAll('.admin-save').forEach(btn => btn.classList.remove('hidden'));
            } else {
                isAdmin = false;
            }
        });

        //REAL TIME DATABASE ENGINE 
        function startLiveDatabase() {
            db.collection('words').onSnapshot((snapshot) => {
                let updatesOccurred = false;

                snapshot.docChanges().forEach((change) => {
                    const updatedData = change.doc.data();
                    const index = globalDictionaryData.findIndex(d => d.term === updatedData.term);
                    
                    if (change.type === "added" || change.type === "modified") {
                        if (index !== -1) {
                            globalDictionaryData[index] = updatedData;
                        } else {
                            globalDictionaryData.push(updatedData);
                        }
                        
                        if (!isInitialLoad) {
                            renderSpecificCard(updatedData);
                            updatesOccurred = true;
                        }
                    } else if (change.type === "removed") {
                        if (index !== -1) globalDictionaryData.splice(index, 1);
                        updatesOccurred = true;
                    }
                });

                if (isInitialLoad) {
                    isInitialLoad = false;
                    filterDictionary();
                } else if (updatesOccurred && document.getElementById('cheatsheet-view').classList.contains('hidden') === false) {
                    filterDictionary();
                }
            });
        }

        function renderSpecificCard(data) {
            const cardId = data.term.toLowerCase().replace(/[^a-z0-9]/g, '');
            let oldCard = document.querySelector(`.card[data-term="${cardId}"]`);
            if (oldCard) {
                const wasOpen = oldCard.classList.contains('active');
                const wasPlaying = oldCard.classList.contains('active-play');
                
                // Clone the card element to cleanly wipe out all old stacked event listeners
                const newCard = oldCard.cloneNode(false);
                oldCard.parentNode.replaceChild(newCard, oldCard);
                
                // Swap of internal HTML structures
                newCard.innerHTML = buildCardInnerHTML(data);
                
                if (wasOpen) newCard.classList.add('active');
                if (wasPlaying) newCard.classList.add('active-play');
                
                // Re bind just one clean listener
                bindCardClickListener(newCard);
            }
        }

        function buildCardInnerHTML(item) {
            const explicitBadge = item.explicit ? '<span class="explicit-badge">NSFW</span>' : '';
            
            let audioButtonsHTML = `
                <div class="audio-btn-wrapper" style="display:flex; flex-direction:column; gap:5px; width:100%; align-items:center;">
                    <button class="cute-play-btn" onclick="playClip(this)">
                        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <span class="wave-container"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span>
                        <span class="text-play">PLAY AUDIO</span>
                        <span class="text-playing">PLAYING...</span>
                    </button>
                    <audio src="${item.audio}" preload="metadata" playsinline></audio>
                </div>
            `;

            let adminDeleteHTML = '';

            if (item.amaritaAudio) {
                audioButtonsHTML += `
                    <div class="audio-btn-wrapper" style="display:flex; flex-direction:column; gap:5px; width:100%; align-items:center;">
                        <button class="cute-play-btn amarita-audio" onclick="playClip(this)">
                            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <span class="wave-container"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span>
                            <span class="text-play">AMARITA PRONUNCIATION</span>
                            <span class="text-playing">PLAYING...</span>
                        </button>
                        <audio src="${item.amaritaAudio}" preload="metadata" playsinline></audio>
                    </div>
                `;
                
                adminDeleteHTML = `
                    <button class="action-btn delete admin-save ${isAdmin ? '' : 'hidden'}" onclick="deleteAdminAudioFromFirebase(this, '${item.term}')" style="margin-top: 10px; width: 100%; justify-content: center;">
                        <i class="fas fa-trash-alt"></i> Admin: Delete Custom Audio
                    </button>
                `;
            }

            return `
                ${explicitBadge}
                <h2>${item.term} <i class="fas fa-chevron-down expand-icon"></i></h2>
                <div class="literal">Literal: ${item.literal}</div>
                <div class="details">
                    <div class="section-title">Meaning</div>
                    <p>${item.meaning}</p>
                    <div class="section-title">Stream Context</div>
                    <div class="stream-context">
                        ${item.context}
                        <span class="example-quote">"${item.quote}"</span>
                    </div>
                    
                    ${audioButtonsHTML}
                    ${adminDeleteHTML}
                    
                    <div class="recording-section">
                        <button class="record-btn" onclick="startRecording(this, '${item.term}')">
                            <i class="fas fa-microphone"></i> Practice Pronunciation
                        </button>
                        <button class="stop-btn hidden" onclick="stopRecording(this)">
                            <i class="fas fa-stop"></i> Stop Recording
                        </button>
                        
                        <div class="playback-ui hidden">
                            <audio class="recorded-audio-player" controls playsinline></audio>
                            <div class="record-controls-row">
                                <button class="action-btn" onclick="resetRecording(this)">
                                    <i class="fas fa-redo"></i> Record Again
                                </button>
                                <button class="action-btn delete" onclick="deleteRecording(this)">
                                    <i class="fas fa-trash"></i> Cancel
                                </button>
                                <button class="action-btn admin-save ${isAdmin ? '' : 'hidden'}" onclick="uploadAdminAudioToFirebase(this, '${item.term}')">
                                    <i class="fas fa-cloud-upload-alt"></i> Admin: Save Audio
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- ADMIN AND VOICE RECORDING SYSTEM ---
        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;

        function handleTitleClick() {
            if (titleClickTimeout === null) {
                titleClickTimeout = setTimeout(() => {
                    titleClickTimeout = null;
                }, 300000);
            } else {
                clearTimeout(titleClickTimeout);
                titleClickTimeout = null;
                adminLogin();
            }
        }

        function adminLogin() {
            if (isAdmin) {
                alert("Admin mode is already active!");
                return;
            }
            const password = prompt("Enter Amarita Admin Password:");
            if (!password) return; 

            const adminEmail = "admin@amarita.com";
            auth.signInWithEmailAndPassword(adminEmail, password)
                .then((userCredential) => {
                    isAdmin = true;
                    alert("Admin Access Granted! Secure connection established.");
                    document.querySelectorAll('.admin-save').forEach(btn => btn.classList.remove('hidden'));
                })
                .catch((error) => {
                    console.error("Login failed:", error.message);
                    alert("Incorrect password.");
                });
        }

        async function startRecording(btn, term) {
            const recordingSection = btn.closest('.recording-section');
            const stopBtn = recordingSection.querySelector('.stop-btn');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const options = { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4' };
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    currentAudioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    const audioUrl = URL.createObjectURL(currentAudioBlob);
                    
                    const playbackUI = recordingSection.querySelector('.playback-ui');
                    const audioPlayer = recordingSection.querySelector('.recorded-audio-player');
                    audioPlayer.src = audioUrl;
                    
                    stopBtn.classList.add('hidden');
                    playbackUI.classList.remove('hidden');
                    if (isAdmin) {
                        recordingSection.querySelector('.admin-save').classList.remove('hidden');
                    }
                };

                mediaRecorder.start();
                btn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
            } catch (err) {
                alert("Microphone access denied.");
                console.error("Mic error:", err);
            }
        }

        function stopRecording(btn) {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
            }
        }

        function resetRecording(btn) {
            deleteRecording(btn);
            btn.closest('.recording-section').querySelector('.record-btn').click();
        }

        function deleteRecording(btn) {
            const recordingSection = btn.closest('.recording-section');
            recordingSection.querySelector('.playback-ui').classList.add('hidden');
            recordingSection.querySelector('.record-btn').classList.remove('hidden');
            recordingSection.querySelector('.recorded-audio-player').src = "";
            currentAudioBlob = null;
        }

        async function uploadAdminAudioToFirebase(btn, term) {
            if (!currentAudioBlob) return;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ...';
            btn.style.pointerEvents = "none";
            
            const docId = term.toLowerCase().replace(/[^a-z0-9]/g, '');
            const fileName = `audio/${docId}_amarita_custom`; 
            
            const storageRef = storage.ref(fileName);
            const metadata = { contentType: currentAudioBlob.type };
            const uploadTask = storageRef.put(currentAudioBlob, metadata);
            
            uploadTask.on('state_changed', null, 
                (error) => {
                    btn.innerHTML = '<i class="fas fa-times"></i> Error';
                    btn.style.backgroundColor = '#ff4d4d';
                }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then(async (downloadURL) => {
                        await db.collection('words').doc(docId).update({
                            amaritaAudio: downloadURL
                        });
                        btn.innerHTML = '<i class="fas fa-check"></i> Live!';
                        btn.style.backgroundColor = '#2ecc71';
                        
                        setTimeout(() => {
                            btn.innerHTML = originalText;
                            btn.style.pointerEvents = "auto";
                            btn.style.backgroundColor = '';
                        }, 2000);
                    });
                }
            );
        }

            async function deleteAdminAudioFromFirebase(btn, term) {
            if(!confirm("Are you sure you want to delete Amara's custom pronunciation?")) return;
            
            const docId = term.toLowerCase().replace(/[^a-z0-9]/g, '');
            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
                btn.style.pointerEvents = "none";
                btn.style.opacity = "0.7";

                // Wipes custom audio from the database
                await db.collection('words').doc(docId).update({
                    amaritaAudio: firebase.firestore.FieldValue.delete()
                });              

            } catch (err) {
                console.error("Error deleting:", err);
                btn.innerHTML = '<i class="fas fa-times"></i> Error';
                btn.style.backgroundColor = '#ff4d4d';
            }
        }

        // STATIC INTERACTION BINDERS 
        function generateDictionaryDOM(data = globalDictionaryData) {
            const flashcardContainer = document.getElementById('flashcard-view');
            const cheatsheetContainer = document.getElementById('cheatsheet-view');
            
            let flashcardsHTML = '';
            let cheatsheetHTML = '';
            
            if (data.length === 0) {
                const emptyStateHTML = `
                    <div class="empty-state">
                        No terms found. Ni modo. <br>
                    </div>
                `;
                flashcardContainer.innerHTML = emptyStateHTML;
                cheatsheetContainer.innerHTML = emptyStateHTML;
                return;
            }

            data.forEach(item => {
                const explicitBadge = item.explicit ? '<span class="explicit-badge">NSFW</span>' : '';
                const cardId = item.term.toLowerCase().replace(/[^a-z0-9]/g, '');

                flashcardsHTML += `<div class="card" data-term="${cardId}">${buildCardInnerHTML(item)}</div>`;

                cheatsheetHTML += `
                    <div class="list-item" data-term="${cardId}">
                        <h3>${item.term} ${explicitBadge}</h3>
                        <div class="list-content">
                            <p><span class="label">Meaning:</span> ${item.meaning}</p>
                            <span class="example-quote"><span class="label">Example:</span> "${item.quote}"</span>
                        </div>
                    </div>
                `;
            });

            flashcardContainer.innerHTML = flashcardsHTML;
            cheatsheetContainer.innerHTML = cheatsheetHTML;
            bindGlobalClickListeners();
        }

        // --- FILTER LOGIC ---
        let debounceTimer;
        function filterDictionary() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value;

            const filteredData = globalDictionaryData.filter(item => {
                const matchesText = item.term.toLowerCase().includes(searchText) || 
                                    item.meaning.toLowerCase().includes(searchText);
                const matchesCategory = selectedCategory === 'All' || item.category === selectedCategory;
                return matchesText && matchesCategory;
            });
            generateDictionaryDOM(filteredData);
        }

        function handleSearchInput() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearch');
            
            if (searchInput.value.length > 0) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
            }

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(filterDictionary, 150);
        }

        function resetAllAudio() {
            document.querySelectorAll('audio').forEach(a => {
                a.pause();
                a.currentTime = 0;
            });
            document.querySelectorAll('.cute-play-btn').forEach(b => b.classList.remove('playing'));
            
            document.querySelectorAll('.card, .list-item').forEach(c => {
                c.classList.remove('active-play');
                c.classList.remove('active'); 
            });
            document.body.classList.remove('is-playing');
        }

        function toggleView() {
            resetAllAudio();
            const flashcards = document.getElementById('flashcard-view');
            const cheatsheet = document.getElementById('cheatsheet-view');
            const button = document.getElementById('toggleBtn');
            
            if (!flashcards || !cheatsheet) return;

            flashcards.classList.toggle('hidden');
            cheatsheet.classList.toggle('hidden');
            if (flashcards.classList.contains('hidden')) {
                button.innerHTML = '<i class="fas fa-th-large" style="margin-right: 8px;"></i> Switch to Flashcard Mode';
                localStorage.setItem('amaritaViewPref', 'cheatsheet'); 
            } else {
                button.innerHTML = '<i class="fas fa-list" style="margin-right: 8px;"></i> Switch to Cheat Sheet Mode';
                localStorage.setItem('amaritaViewPref', 'flashcard'); 
            }
        }

        // DUAL PLAYBACK CAPTURE LOGIC
        function playClip(btn) {
            const card = btn.closest('.card');
            const audioWrapper = btn.closest('.audio-btn-wrapper');
            const audio = audioWrapper ? audioWrapper.querySelector('audio') : null;

            if (!audio) return;

            if (!audio.paused) {
                resetAllAudio();
                card.classList.add('active', 'active-play');
                document.body.classList.add('is-playing');
                return;
            }

            resetAllAudio();
            card.classList.add('active', 'active-play');
            document.body.classList.add('is-playing');
            
            audio.play().then(() => {
                btn.classList.add('playing');
            }).catch(e => console.log("Playback error:", e));
            
            audio.onended = () => {
                resetAllAudio();
                card.classList.add('active', 'active-play');
                document.body.classList.add('is-playing');
            };
        }

        document.addEventListener('click', function(event) {
            const clickedInsideElement = event.target.closest('.card, .list-item');
            const clickedToggleButton = event.target.closest('.toggle-btn');
            if (!clickedInsideElement && !clickedToggleButton && document.body.classList.contains('is-playing')) {
                 resetAllAudio();
            }
        });

        async function checkTwitchLive() {
            const username = 'okieamara';
            const container = document.getElementById('status-container');
            const text = document.getElementById('status-text');
            try {
                const response = await fetch(`https://decapi.me/twitch/uptime/${username}`);
                const data = await response.text();
                if (data.includes("offline")) {
                    container.classList.remove("live-pulse");
                    text.innerText = "Offline";
                    text.style.color = "#808080";
                } else {
                    container.classList.add("live-pulse");
                    text.innerText = "Live";
                }
            } catch (e) { 
                text.innerText = "Error";
            }
        }

        function bindCardClickListener(element) {
            element.addEventListener('click', function(event) {
                
                if (event.target.closest('.cute-play-btn') || 
                    event.target.closest('.recording-section') || 
                    event.target.closest('.admin-save')) return;
                
                const isAlreadyActive = this.classList.contains('active-play');
                resetAllAudio();
   
                if (!isAlreadyActive) {
                    if (this.classList.contains('card')) {
                        this.classList.add('active'); 
                    }
                    this.classList.add('active-play'); 
                    document.body.classList.add('is-playing');
                }
            });
        }

        function bindGlobalClickListeners() {
            document.querySelectorAll('.card, .list-item').forEach(element => {
                bindCardClickListener(element);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Unlocks modern context metrics rules across mobile browsers dynamically on primary user interactions
            window.addEventListener('click', () => {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }, { once: true });
            
            startLiveDatabase();

            document.getElementById('searchInput').addEventListener('input', handleSearchInput);
            document.getElementById('categoryFilter').addEventListener('change', filterDictionary);

            document.getElementById('clearSearch').addEventListener('click', () => {
                const searchInput = document.getElementById('searchInput');
                searchInput.value = ''; 
                document.getElementById('clearSearch').style.display = 'none';
                searchInput.focus(); 
                filterDictionary(); 
            });

            const savedView = localStorage.getItem('amaritaViewPref');
            if (savedView === 'cheatsheet') {
                const flashcards = document.getElementById('flashcard-view');
                const cheatsheet = document.getElementById('cheatsheet-view');
                const button = document.getElementById('toggleBtn');
                
                flashcards.classList.add('hidden');
                cheatsheet.classList.remove('hidden');
                button.innerHTML = '<i class="fas fa-th-large" style="margin-right: 8px;"></i> Switch to Flashcard Mode';
            }

            checkTwitchLive();
            setInterval(checkTwitchLive, 60000);
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && document.body.classList.contains('is-playing')) {
                resetAllAudio(); 
            }
        });

        let playedClips = [];
        function playRandomMango() {
            const audio = document.getElementById('mango-audio');
            const mangoBtn = document.querySelector('.mango-btn'); 
            const clips = [
                'audio/I DID IT.m4a',
                'audio/LIFE CHANGING QUOTE.m4a',
                'audio/VAZZINGTON.m4a',
                'audio/YEYEYE.m4a',
                'audio/WHAT THE FLUFFER AMARA.m4a'
            ];

            if (playedClips.length === clips.length) playedClips = [];

            let availableClips = clips.filter(clip => !playedClips.includes(clip));
            const randomClip = availableClips[Math.floor(Math.random() * availableClips.length)];
            
            mangoBtn.classList.add('animate-mango');
            audio.src = randomClip;
            audio.play().catch(e => console.log("Mango playback failed:", e));
            playedClips.push(randomClip);
            audio.onended = () => {
                mangoBtn.classList.remove('animate-mango');
            };
        }

        const suggestionForm = document.getElementById('suggestion-form');
        if (suggestionForm) {
            suggestionForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const button = e.target.querySelector('button');
                const originalText = button.innerText;
                button.innerText = 'SENDING...';
                button.style.background = '#5ce1e6'; 

                fetch(e.target.action, {
                    method: 'POST',
                    body: new FormData(e.target),
                })
                .then(response => {
                    if(response.ok) {
                        button.innerText = 'SENT!';
                        button.classList.add('btn-success'); 
                        e.target.reset(); 
                    }
                })
                .catch(() => {
                    button.innerText = 'ERROR';
                    button.style.background = '#ff4d4d';
                })
                .finally(() => {
                    setTimeout(() => {
                        button.innerText = originalText;
                        button.classList.remove('btn-success'); 
                        button.style.background = '#ff55d2'; 
                        button.style.boxShadow = '';  
                    }, 3000);
                });
            });
        }
    </script>
</body>
</html>
